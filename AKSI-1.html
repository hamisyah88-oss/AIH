// ===== NAVIGATION =====
function navigate(page) {
  currentPage = page;
  renderPage();
  updateNavActive();
  document.getElementById('content').scrollTop = 0;
}

function toggleMobile() {
  document.getElementById('mobile-nav').classList.toggle('hidden');
}

function updateNavActive() {
  document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.classList.remove('bg-blue-50', 'text-blue-700', 'font-semibold');
    if (btn.dataset.nav === currentPage) {
      btn.classList.add('bg-blue-50', 'text-blue-700', 'font-semibold');
    }
  });
}

// ===== PAGE RENDERING =====
function renderPage() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="fade-in">' + getPageContent() + '</div>';
  lucide.createIcons();
}

function getPageContent() {
  switch(currentPage) {
    case 'beranda': return renderBeranda();
    case 'tentang': return renderTentang();
    case 'unit1': case 'unit2': case 'unit3': case 'unit4': case 'unit5':
      return renderUnit(currentPage);
    case 'kasus': return renderKasus();
    case 'aksi': return renderAksi();
    case 'kuis': return renderKuis();
    case 'proyek': return renderProyek();
    case 'dashboard': return renderDashboard();
    default: return renderBeranda();
  }
}

function renderUnit(unitId) {
  const unit = units.find(u => u.id === unitId);

  const idx = units.indexOf(unit);
  const prev = idx > 0 ? units[idx-1] : null;
  const next = idx < units.length - 1 ? units[idx+1] : null;
  return `
    ${unit.content}
    <div class="flex justify-between mt-8 pt-6 border-t border-slate-200">
      ${prev ? `<button onclick="navigate('${prev.id}')" class="text-sm text-blue-600 hover:text-blue-800 flex items-center gap-1"><i data-lucide="arrow-left" class="w-4 h-4"></i> ${prev.title}</button>` : '<div></div>'}

async function saveAksiData(section) {
  if (!currentCase) return;
  const textareas = document.querySelectorAll(`[data-field]`);
  let answers = {};
  textareas.forEach(ta => { answers[ta.dataset.field] = ta.value; });
  
  if (appData.length >= 999) {
    showToast('Batas penyimpanan tercapai (999 data)', 'error');
    return;
  }

  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳ Menyimpan...';

  const result = await window.dataSdk.create({
    type: 'aksi_' + section,
    unit_id: '',
    case_id: currentCase,
    question_key: section,
    answer: JSON.stringify(answers),
    score: 0,
    completed: true,
    created_at: new Date().toISOString()
  });

  if (result.isOk) {
    showToast('Berhasil disimpan! ✅', 'success');
  } else {
    showToast('Gagal menyimpan. Coba lagi.', 'error');
  }
  btn.disabled = false;
  btn.textContent = '💾 Simpan';
}

// ===== QUIZ =====
function renderKuis() {
  if (quizState.submitted) return renderQuizResults();
  const q = quizQuestions[quizState.current];
  const progress = ((quizState.current) / quizQuestions.length * 100).toFixed(0);
  return `
    <div class="flex items-center justify-between mb-4">
      <h2 class="text-xl font-bold text-slate-800">Kuis HOTS</h2>
      <span class="text-xs bg-blue-100 text-blue-700 px-2.5 py-1 rounded-full font-medium">Level ${q.level}</span>
    </div>
    <div class="w-full bg-slate-200 rounded-full h-2 mb-6">
      <div class="bg-blue-600 h-2 rounded-full progress-bar" style="width:${progress}%"></div>
    </div>
    <p class="text-xs text-slate-500 mb-4">Soal ${quizState.current + 1} dari ${quizQuestions.length}</p>
    <div class="bg-white border border-slate-200 rounded-xl p-6 mb-4">
      <p class="text-sm text-slate-800 font-medium leading-relaxed">${q.q}</p>
    </div>
    <div class="space-y-3 mb-6">
      ${q.options.map((opt, i) => `
        <button onclick="selectQuizAnswer(${i})" class="quiz-option w-full text-left border border-slate-200 rounded-lg p-4 text-sm ${quizState.answers[quizState.current] === i ? 'selected' : ''}">
          <span class="font-medium text-slate-500 mr-2">${String.fromCharCode(65+i)}.</span> ${opt}
        </button>
      `).join('')}
    </div>
    <div class="flex justify-between">
      <button onclick="prevQuiz()" class="text-sm text-slate-500 hover:text-slate-700 ${quizState.current === 0 ? 'invisible' : ''}" ${quizState.current === 0 ? 'disabled' : ''}>← Sebelumnya</button>
      ${quizState.current < quizQuestions.length - 1 ? 
        `<button onclick="nextQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition" ${quizState.answers[quizState.current] === undefined ? 'disabled style="opacity:0.5"' : ''}>Selanjutnya →</button>` :
        `<button onclick="submitQuiz()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition" ${quizState.answers[quizState.current] === undefined ? 'disabled style="opacity:0.5"' : ''}>Selesai & Lihat Skor</button>`
      }
    </div>
  `;
}

function selectQuizAnswer(idx) {
  quizState.answers[quizState.current] = idx;
  renderPage();
}

function nextQuiz() { if (quizState.current < quizQuestions.length - 1) { quizState.current++; renderPage(); } }
function prevQuiz() { if (quizState.current > 0) { quizState.current--; renderPage(); } }

async function submitQuiz() {
  let score = 0;
  quizQuestions.forEach((q, i) => { if (quizState.answers[i] === q.correct) score++; });
  quizState.score = score;
  quizState.submitted = true;

  if (appData.length < 999) {
    await window.dataSdk.create({
      type: 'quiz_result',
      unit_id: '',
      case_id: '',
      question_key: 'quiz_hots',
      answer: JSON.stringify(quizState.answers),
      score: Math.round((score / quizQuestions.length) * 100),
      completed: true,
      created_at: new Date().toISOString()
    });
  }
  renderPage();
}

function renderQuizResults() {
  const pct = Math.round((quizState.score / quizQuestions.length) * 100);
  const grade = pct >= 90 ? 'A' : pct >= 80 ? 'B' : pct >= 70 ? 'C' : 'D';
  return `
    <div class="text-center py-8">
      <div class="text-5xl mb-4">${pct >= 70 ? '🎉' : '💪'}</div>
      <h2 class="text-2xl font-bold text-slate-800 mb-2">Hasil Kuis HOTS</h2>
      <div class="inline-flex items-center gap-3 bg-white border-2 ${pct >= 70 ? 'border-green-300' : 'border-amber-300'} rounded-2xl px-8 py-4 mb-4">
        <span class="text-4xl font-extrabold ${pct >= 70 ? 'text-green-600' : 'text-amber-600'}">${pct}</span>
        <span class="text-slate-500 text-sm text-left">poin<br><span class="font-bold text-lg text-slate-800">Grade ${grade}</span></span>
      </div>
      <p class="text-sm text-slate-500 mb-6">Benar: ${quizState.score}/${quizQuestions.length}</p>
    </div>
    <h3 class="font-bold text-slate-800 mb-4">📝 Pembahasan</h3>
    <div class="space-y-4 mb-8">
      ${quizQuestions.map((q, i) => {
        const isCorrect = quizState.answers[i] === q.correct;
        return `
          <div class="bg-white border ${isCorrect ? 'border-green-200' : 'border-red-200'} rounded-xl p-4">
            <div class="flex items-start gap-2 mb-2">
              <span class="text-sm">${isCorrect ? '✅' : '❌'}</span>
              <p class="text-sm text-slate-800 font-medium">${i+1}. ${q.q}</p>
            </div>
            <p class="text-xs ${isCorrect ? 'text-green-700' : 'text-red-700'} ml-6">Jawabanmu: ${String.fromCharCode(65 + (quizState.answers[i] ?? 0))} ${isCorrect ? '(Benar)' : `(Salah) • Jawaban benar: ${String.fromCharCode(65 + q.correct)}`}</p>
            <p class="text-xs text-slate-600 ml-6 mt-1 bg-slate-50 p-2 rounded">${q.explanation}</p>
          </div>
        `;
      }).join('')}
    </div>
    <button onclick="resetQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium">🔄 Ulangi Kuis</button>
  `;
}

function resetQuiz() {
  quizState = { current: 0, answers: [], submitted: false, score: 0 };
  renderPage();
}

// ===== TOAST =====
function showToast(msg, type) {
  const existing = document.getElementById('toast');
  if (existing) existing.remove();
  const toast = document.createElement('div');
  toast.id = 'toast';
  toast.className = `fixed bottom-4 right-4 z-50 px-4 py-3 rounded-lg text-sm font-medium shadow-lg transition ${type === 'success' ? 'bg-green-600 text-white' : 'bg-red-600 text-white'}`;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 3000);
}
